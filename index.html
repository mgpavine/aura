<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura App</title>

<link rel="manifest" href="manifest.json">

<!-- 🔥 FIREBASE COMPATÍVEL -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
    background: black;
    color: #00ffff;
    font-family: monospace;
    text-align: center;
}

.turma {
    margin: 10px;
    padding: 15px;
    border-radius: 12px;
    background: #111;
    color: white;
}

button {
    margin: 5px;
    padding: 8px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>⚡ AURA DAS TURMAS ⚡</h1>

<input type="password" id="senha" placeholder="Senha">
<button onclick="login()">Entrar</button>

<div id="turmas"></div>

<h2>🏆 Ranking</h2>
<ol id="ranking"></ol>

<script>

let admin = false;
const SENHA = "mgp377377377";

// 🔥 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDK3oUfQusYOFBYfHF7O58dYt9yl4amqY8",
  authDomain: "aurometro-ceae0.firebaseapp.com",
  databaseURL: "https://aurometro-ceae0-default-rtdb.firebaseio.com",
  projectId: "aurometro-ceae0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ref = db.ref("turmas");

const listaTurmas = [
"1º A","1º B","1º C","1º SJ",
"2º A","2º B","2º C","2º SJ",
"3º A","3º B","3º C","3º SJ"
];

// 🔥 CRIA DADOS SE NÃO EXISTIR
ref.once("value", snap => {
    if (!snap.exists()) {
        let dados = listaTurmas.map(t => ({
            nome: t,
            aura: 0
        }));
        ref.set(dados);
    }
});

// LOGIN
function login() {
    if (document.getElementById("senha").value === SENHA) {
        admin = true;
        renderLast();
        alert("Modo professor ⚡");
    }
}

// ALTERAR PONTOS
function alterar(i, v) {
    if (!admin) return alert("Somente professor");

    ref.once("value", snap => {
        let turmas = snap.val();
        turmas[i].aura += v;
        ref.set(turmas);
    });
}

// RENDER INICIAL
function renderLast() {
    ref.once("value", snap => render(snap.val()));
}

// ESCUTA EM TEMPO REAL
ref.on("value", snap => {
    if (snap.exists()) {
        render(snap.val());
    }
});

// RENDERIZA TELA
function render(turmas) {
    const div = document.getElementById("turmas");
    const ranking = document.getElementById("ranking");

    div.innerHTML = "";
    ranking.innerHTML = "";

    turmas.forEach((t,i) => {
        div.innerHTML += `
        <div class="turma">
            <h3>${t.nome}</h3>
            <p>${t.aura}</p>

            ${admin ? `
                <button onclick="alterar(${i},10)">+10</button>
                <button onclick="alterar(${i},-10)">-10</button>
            ` : ""}
        </div>
        `;
    });

    let ordenado = [...turmas].sort((a,b)=>b.aura-a.aura);

    ordenado.forEach(t=>{
        ranking.innerHTML += `<li>${t.nome} - ${t.aura}</li>`;
    });
}

</script>

</body>
</html>
